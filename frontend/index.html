<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>CampusMart | Buy & Sell Student Goods | Best Campus Housing in Kenya</title>
    <meta name="description"
        content="The official CampusMart: Connects university students, traders & landlords. Buy textbooks, furniture & laptops at comrade prices. Find hostels & apartments near JKUAT, KU, UoN and more." />
    <meta name="keywords"
        content="campusmart, student marketplace, campus accommodation, student housing Kenya, buy textbooks online, sell laptops, hostel finder Juja, student rooms KU, comrade prices, campus trading" />
    <meta name="author" content="CampusMart Team" />
    <meta name="robots" content="index, follow" />
    <meta name="google-site-verification" content="ADD_YOUR_GOOGLE_VERIFICATION_CODE_HERE" />
    <link rel="canonical" href="https://campusmart.co.ke/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://campusmart.co.ke/" />
    <meta property="og:title" content="CampusMart ΓÇô Student Marketplace & Accommodation" />
    <meta property="og:description"
        content="Join 10,000+ students trading at comrade prices. Find the best housing near your campus. 100% Free." />
    <meta property="og:image" content="https://campusmart.co.ke/logo.png" />
    <meta property="og:image:alt" content="CampusMart Logo" />
    <meta property="og:site_name" content="CampusMart" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CampusMart ΓÇô Trade & Live Better" />
    <meta name="twitter:description"
        content="Buy and sell textbooks, electronics & more. Find student housing near campus." />
    <meta name="twitter:image" content="https://campusmart.co.ke/logo.png" />

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA & Mobile -->
    <link rel="manifest" href="/manifest.json?v=5" />
    <meta name="theme-color" content="#1d3d6e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CampusMart" />
    <meta name="application-name" content="CampusMart" />

    <!-- Google Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "CampusMart",
        "alternateName": "CampusMart Kenya",
        "url": "https://campusmart.co.ke/",
        "description": "Student marketplace and accommodation platform. Buy and sell campus goods at comrade prices. Find hostels, single rooms and apartments near your campus. Connect with traders and landlords directly.",
        "potentialAction": {
            "@type": "SearchAction",
            "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://campusmart.co.ke/?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
        }
    }
    </script>

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "CampusMart",
        "alternateName": "CampusMart Kenya",
        "url": "https://campusmart.co.ke/",
        "logo": {
            "@type": "ImageObject",
            "url": "https://campusmart.co.ke/logo.png",
            "width": "512",
            "height": "512"
        },
        "sameAs": [
            "https://facebook.com/campusmart_ke",
            "https://twitter.com/campusmart_ke",
            "https://instagram.com/campusmart_ke"
        ],
        "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+254-000-000000",
            "contactType": "customer support",
            "areaServed": "KE",
            "availableLanguage": ["English", "Swahili"]
        }
    }
    </script>

    <!-- Fonts & External Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('CampusMart SW registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>

</html>
