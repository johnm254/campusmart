services:
  - type: web
    name: campus-mart-api
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campus-mart-db
          property: connectionString
      - key: DB_TYPE
        value: postgres
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

  - type: web
    name: campus-mart-frontend
    env: static
    region: frankfurt
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: campus-mart-api
          property: host
        # The user has to wrap 'host' with https:// -> https://${host}/api maybe? 
        # Actually it's simpler to set VITE_API_URL on Render dashboard to the deployed API url.

databases:
  - name: campus-mart-db
    databaseName: campusmart
    user: campusadmin
    plan: free
    region: frankfurt
